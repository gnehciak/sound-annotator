<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Sound Annotator</title>
    <!-- Resolve the theme + palette before first paint so there's no flash.
         Mirrors lib/theme.ts: 'system' (default) follows the OS; 'light' /
         'dark' are explicit overrides; the palette picks the signal hue.
         Classic (blocking) script on purpose. -->
    <script>
      ;(function () {
        try {
          var pref = localStorage.getItem('sound-annotator:theme') || 'system'
          var dark =
            pref === 'dark' ||
            (pref !== 'light' &&
              window.matchMedia('(prefers-color-scheme: dark)').matches)
          var theme = dark ? 'dark' : 'light'
          document.documentElement.dataset.theme = theme
          document.documentElement.style.colorScheme = theme
          var palette = localStorage.getItem('sound-annotator:palette')
          if (
            ['tangerine', 'bubblegum', 'limeade', 'crayon'].indexOf(palette) <
            0
          )
            palette = 'tangerine'
          document.documentElement.dataset.palette = palette
        } catch (e) {
          document.documentElement.dataset.theme = 'dark'
          document.documentElement.dataset.palette = 'tangerine'
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
